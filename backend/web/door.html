<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Door - Door Client</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 2rem;
        background: #1a1a2e;
        color: #eee;
      }
      #status {
        font-size: 1.2rem;
        margin: 1rem 0;
        padding: 1rem;
        border-radius: 8px;
      }
      .connected {
        background: #16213e;
        border: 1px solid #0f3460;
      }
      .disconnected {
        background: #3d0000;
        border: 1px solid #e94560;
      }
      .in-call {
        background: #0d2818;
        border: 1px solid #2ecc71;
      }
      #call-info {
        margin: 1rem 0;
        color: #aaa;
      }
      video {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Door Client</h1>
    <div id="status" class="disconnected">Disconnected</div>
    <div id="call-info"></div>
    <video id="localVideo" autoplay muted playsinline></video>

    <script>
      const WS_URL = `ws://${location.host}/ws/signaling?role=door`;
      const ICE_SERVERS = [{ urls: "stun:stun.l.google.com:19302" }];
      const RECONNECT_INTERVAL = 3000;

      let ws = null;
      let pc = null;
      let localStream = null;

      const statusEl = document.getElementById("status");
      const callInfoEl = document.getElementById("call-info");

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls;
      }

      function connectWS() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          setStatus("Connected - Waiting for call...", "connected");
          console.log("[Door] WebSocket connected");
        };

        ws.onclose = () => {
          setStatus("Disconnected - Reconnecting...", "disconnected");
          console.log("[Door] WebSocket closed, reconnecting...");
          setTimeout(connectWS, RECONNECT_INTERVAL);
        };

        ws.onerror = (err) => {
          console.error("[Door] WebSocket error:", err);
          ws.close();
        };

        ws.onmessage = async (event) => {
          const msg = JSON.parse(event.data);
          console.log("[Door] Received:", msg.type);

          switch (msg.type) {
            case "call_request":
              await handleCallRequest();
              break;
            case "answer":
              await handleAnswer(msg);
              break;
            case "ice-candidate":
              await handleIceCandidate(msg);
              break;
            case "hangup":
              handleHangup();
              break;
          }
        };
      }

      async function handleCallRequest() {
        setStatus("Call incoming - Setting up...", "in-call");
        callInfoEl.textContent = "Acquiring camera and microphone...";

        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { width: 640, height: 480, facingMode: "user" },
            audio: true,
          });

          pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

          localStream.getTracks().forEach((track) => {
            pc.addTrack(track, localStream);
          });

          pc.onicecandidate = (event) => {
            if (event.candidate) {
              sendMessage({
                type: "ice-candidate",
                candidate: event.candidate,
              });
            }
          };

          pc.oniceconnectionstatechange = () => {
            console.log("[Door] ICE state:", pc.iceConnectionState);
            if (pc.iceConnectionState === "connected") {
              setStatus("In Call", "in-call");
              callInfoEl.textContent =
                "Call active - streaming video and audio";
            } else if (
              pc.iceConnectionState === "disconnected" ||
              pc.iceConnectionState === "failed"
            ) {
              handleHangup();
            }
          };

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          sendMessage({ type: "offer", sdp: pc.localDescription });

          callInfoEl.textContent = "SDP offer sent, waiting for answer...";
        } catch (err) {
          console.error("[Door] Error setting up call:", err);
          callInfoEl.textContent = "Error: " + err.message;
          handleHangup();
        }
      }

      async function handleAnswer(msg) {
        if (!pc) return;
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
          console.log("[Door] Remote description set (answer)");
        } catch (err) {
          console.error("[Door] Error setting remote description:", err);
        }
      }

      async function handleIceCandidate(msg) {
        if (!pc) return;
        try {
          await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
        } catch (err) {
          console.error("[Door] Error adding ICE candidate:", err);
        }
      }

      function handleHangup() {
        if (pc) {
          pc.close();
          pc = null;
        }
        if (localStream) {
          localStream.getTracks().forEach((track) => track.stop());
          localStream = null;
        }
        setStatus("Connected - Waiting for call...", "connected");
        callInfoEl.textContent = "Call ended";
      }

      function sendMessage(msg) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(msg));
        }
      }

      connectWS();
    </script>
  </body>
</html>
