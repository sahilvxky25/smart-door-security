version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: smartdoor
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"

  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mosquitto
